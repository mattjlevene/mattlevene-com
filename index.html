<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Matt Levene</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { -webkit-font-smoothing: antialiased; }
    body {
      font-family: 'Inter', sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .home {
      text-align: center;
      padding: 40px 24px;
    }
    .home-image {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      object-fit: cover;
      object-position: top center;
      border: 2px solid rgba(74, 222, 128, 0.3);
      margin: 0 auto 32px;
      display: block;
    }
    .home-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.02em;
      margin-bottom: 24px;
    }
    .home-contact {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    .home-contact-label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1rem;
      color: #888;
      letter-spacing: 0.1em;
      font-weight: 500;
    }
    .home-icons {
      display: flex;
      gap: 16px;
    }
    .home-icons a {
      color: #4ADE80;
      transition: opacity 0.2s;
    }
    .home-icons a:hover {
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="home">
    <img src="/headshot-opt.jpg" alt="Matt Levene" class="home-image">
    <h1 class="home-name">MATT LEVENE</h1>
    <div class="home-contact">
      <span class="home-contact-label">GET IN TOUCH:</span>
      <div class="home-icons">
        <a href="https://www.linkedin.com/in/mattlevene/" target="_blank" rel="noopener" aria-label="LinkedIn" title="LinkedIn">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-4 0v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
        </a>
        <a href="https://instagram.com/mattlevene" target="_blank" rel="noopener" aria-label="Instagram" title="Instagram">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1.5" fill="currentColor" stroke="none"/></svg>
        </a>
      </div>
    </div>
  </div>
</body>
</html>
